name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-progress production runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The documentation is fetched from the fastify/fastify repository at build
      # time (see scripts/fetch-docs.mjs). This needs `git` and network access,
      # both available on the runner — no GitHub authentication required.
      - name: Fetch Fastify documentation (all versions)
        run: pnpm run fetch:docs

      # Runs `astro build` and generates the Pagefind search index.
      - name: Build site
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
